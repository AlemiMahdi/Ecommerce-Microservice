spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/products/**

            - id: auth-service-auth
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/auth/**

            - id: auth-service-users
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**

server:
  port: 8080

jwt:
  secret: THIS_IS_A_VERY_LONG_SECRET_KEY_FOR_MY_ECOMMERCE_AUTH_SERVICE_123456