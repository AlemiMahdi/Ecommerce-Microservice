#Namnet på Spring Boot-appen
spring.application.name=product-service

#Serverport för product-service
server.port=8081

#H2 databas i minnet
spring.datasource.url=jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

#Aktiverar H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#JPA/Hibernate-inställningar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Gör att sql körs efter att hibernate skapat tabeller
spring.jpa.defer-datasource-initialization=true